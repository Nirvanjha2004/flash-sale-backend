version: '3.8'

services:
  order-service:
    build:
      context: ./apps/order-service
      dockerfile: ../../Dockerfile.base
    ports:
      - "3000:3000"
    environment:
      - REDIS_HOST=redis
      - KAFKA_BROKERS=kafka:9092
      - DATABASE_URL=postgresql://user:password@db:5432/flashsale
    depends_on:
      - redis
      - kafka
      - db

  order-consumer:
    build:
      context: ./apps/order-consumer
      dockerfile: ../../Dockerfile.base
    environment:
      - KAFKA_BROKERS=kafka:9092
      - DATABASE_URL=postgresql://user:password@db:5432/flashsale
    depends_on:
      - kafka
      - db

  expiry-server:
    build:
      context: ./apps/expiry-server
      dockerfile: ../../Dockerfile.base
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://user:password@db:5432/flashsale
    depends_on:
      - redis
      - db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=flashsale
    ports:
      - "5432:5432"
